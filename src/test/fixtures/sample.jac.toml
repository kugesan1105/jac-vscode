# Sample jac.toml exercising every Jac-known table and key.

[project]
name = "sample-jac-app"
version = "0.1.0"
description = "Fixture for jactoml grammar testing"
entry-point = "main.jac"
authors = ["Jaseci Labs"]
license = "MIT"
keywords = ["jac", "sample"]
requires-python = ">=3.11"

[project.urls]
homepage = "https://www.jac-lang.org/"

[project.include]
data = ["assets/**/*"]

[dependencies]
jaclang = ">=0.8.0"
httpx = "^0.27.0"

[dev-dependencies]
pytest = "*"

[optional-dependencies.tools]
ruff = "*"

[entrypoints.jac]
sample = "sample:main"

[test]
directory = "tests"
verbose = true
fail_fast = false

[run]
topology_index = false

[serve]
base_route_app = "app"

[check.lint]
select = ["all"]
exclude = ["docs/*"]

[plugins.byllm.model]
default_model = "anthropic/claude-opus-4-7"

[plugins.client.vite]
plugins = ["tailwindcss()"]

[[plugins.scale.microservices.shared_volumes]]
name = "shared"
mount_path = "/mnt/shared"

[plugins.scale.sso.github]
client_id = "${GITHUB_CLIENT_ID}"
client_secret = "${GITHUB_CLIENT_SECRET}"
public_link = "${GITHUB_PUBLIC_LINK}"
app_slug = "${GITHUB_APP_SLUG}"
host = "$HOST"
no_vars_here = "plain literal value"
